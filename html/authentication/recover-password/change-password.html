<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Change Password</title>
</head>
<body>
    <header>
        <h1>Recuperar Senha</h1>
        <a class="tr-btn" href="../login.html">Voltar</a>
    </header>

    <main>
        <h1>Defina nova senha</h1>
        <form action="" method="post">
            <label for="new-password">Digite sua nova senha:</label>
            <input 
                type="password" 
                name="new-password" 
                id="new-password"
                minlength="8"
                required
            >
            <button class="btn-view">
                <i class="fa-solid fa-eye"></i>
            </button>

            <label for="check-password">Confirme sua senha</label>
            <input 
                id="check-password"
                name="check-password"
                type="password"
                minlength="8"
                required
            >
            <button class="btn-view">
              <i class="fa-solid fa-eye"></i>
            </button>

            <button id="submit" type="submit">Alterar Senha</button>
        </form>
    </main>
</body>
</html>
