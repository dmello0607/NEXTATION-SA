<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Verify</title>
</head>
<body>
    <header>
        <h1>Recuperar Senha</h1>
        <a class="tr-btn" href="../login.html">Voltar</a>
    </header>

    <main>
        <h1>Confirme que é você</h1>
        <p>Insira o código de 6 dígitos que enviamos no seu email</p>
        <label for="code">Insira o código</label>
        <input 
            id="code"
            name="code"
            type="text"
            minlength="6"
            maxlength="6"
            required
        >
        <p>Se não receber em 5 minutos, clique para <button>reenviar</button></p>

        <a href="change-password.html" class="btn-blue">Confirmar</a>
        <a href="" class="btn-grey">Fale conosco</a>
    </main>
</body>
</html>
