<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
</head>
<body>
    <header>
        <h1>Recuperar Senha</h1>
        <a class="tr-btn" href="../authentication/login.html">Voltar</a>
    </header>

    <main>
        <h1>Confirme que é você</h1>
        <p>Enviaremos um código para o seu email</p>
        <label for="email">Seu email:</label>
        <input
            id="email"
            name="email" 
            type="email"
            autocomplete="email"
            required
            placeholder="email"
        >
        <button class="btn-blue">Enviar</button>
    </main>
</body>
</html>
